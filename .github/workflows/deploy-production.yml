name: Deploy Production (server)

# Deploy the Worker + apply D1 migrations on push to master.
# The client is deployed by Cloudflare Pages' Git integration, so this only
# covers the server. Path-filtered so client-only changes don't redeploy it.
on:
  push:
    branches: [master]
    paths:
      - 'server/**'
      - '.github/workflows/deploy-production.yml'

# Avoid overlapping deploys if pushes land quickly.
concurrency:
  group: deploy-production-server
  cancel-in-progress: false

jobs:
  deploy:
    name: Migrate DB & deploy Worker
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      # Apply migrations first so the new schema is ready before new code runs.
      - run: npx wrangler d1 migrations apply nihonthing_db --remote
      - run: npx wrangler deploy --minify
