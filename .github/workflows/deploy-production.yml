name: Deploy Production (server)

# Deploy the Worker + apply D1 migrations on push to master.
# The client is deployed by Cloudflare Pages' Git integration, so this only
# covers the server. Path-filtered so client-only changes don't redeploy it.
on:
  push:
    branches: [master]
    paths:
      - 'server/**'
      - '.github/workflows/deploy-production.yml'

# Avoid overlapping deploys if pushes land quickly.
concurrency:
  group: deploy-production-server
  cancel-in-progress: false

jobs:
  deploy:
    name: Migrate DB & deploy Worker
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      # Build before touching the database. Migrations have no down step, so a
      # broken build that got merged anyway must fail here — not after the
      # schema has already moved ahead of the deployed code.
      - run: npx wrangler deploy --dry-run --outdir dist
      # Migrations run before the deploy so the new schema is ready when the new
      # code goes live.
      - run: npx wrangler d1 migrations apply nihonthing_db --remote
      - run: npx wrangler deploy --minify
