name: CI

# Validate every PR into master and every push to master. No secrets, no deploy.
on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  client:
    name: Client — lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  server:
    name: Server — build check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      # Compiles the Worker with esbuild without deploying — catches build/type
      # errors. Needs no Cloudflare credentials.
      - run: npx wrangler deploy --dry-run --outdir dist
