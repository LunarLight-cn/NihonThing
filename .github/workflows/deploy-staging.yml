name: Deploy Staging (server)

# Deploy the staging Worker + migrate the staging D1 on push to the staging
# branch. Separate Worker (nihonthing-api-staging) and D1, so production is
# never touched. The staging client is served by Cloudflare Pages' preview
# build of the same branch.
on:
  push:
    branches: [staging]
    paths:
      - 'server/**'
      - '.github/workflows/deploy-staging.yml'

concurrency:
  group: deploy-staging-server
  cancel-in-progress: false

jobs:
  deploy:
    name: Migrate staging DB & deploy staging Worker
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      # Build before touching the database. Migrations have no down step, so a
      # broken build that got merged anyway must fail here - not after the
      # schema has already moved ahead of the deployed code.
      - run: npx wrangler deploy --dry-run --outdir dist --env staging
      # --env staging resolves the nihonthing_db binding to the staging D1.
      - run: npx wrangler d1 migrations apply nihonthing_db --remote --env staging
      - run: npx wrangler deploy --minify --env staging
